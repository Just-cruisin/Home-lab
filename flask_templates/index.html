<!DOCTYPE html>
<html>
<head>
	<title>Testing VM Dashboard</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
	<div class="container mt-4">
		<h1>Testing VM Dashboard</h1>
		<div class="card mt-3">
			<div class="card-header">Disk Usage</div>
			<div class="card-body">
				<p>{{disk_percentage }}%</p>
				<p>{{status }}</p>
				<p class="
					{% if satus == 'CRITICAL' %}text-danger
					{% elif satus == 'WARNING' %}text-warning
					{% else %}text-success
					{% endif %}
				">Status: {{ status }}</p>
			</div>
		</div>
	</div>
</body>
</html>
