# Disable dnsmasq dns - bind9 handles dns
port=0

# Only listen on VLAN interfaces
interface=ens19.10
interface=ens19.20

# VLAN 10 DHCP pool
dhcp-range=set:vlan10,192.168.10.100,192.168.10.200,255.255.255.0,12h

# VLAN 20 DHCP pool
dhcp-range=set:vlan20,192.168.20.100,192.168.20.200,255.255.255.0,12h

# Default gateway per VLAN (option 3)
dhcp-option=tag:vlan10,3,192.168.10.1
dhcp-option=tag:vlan20,3,192.168.20.1

# DNS server per VLAN (option 6)
dhcp-option=tag:vlan10,6,192.168.10.1
dhcp-option=tag:vlan20,6,192.168.20.1

# Static reservations
dhcp-host=bc:24:11:cc:73:61,192.168.10.50,client1
dhcp-host=bc:24:11:af:ca:02,192.168.20.50,client2

# Log DHCP transactions
log-dhcp
log-facility=/var/log/dnsmasq.log

# NTP server per VLAN (option 42)
dhcp-option=tag:vlan10,42,192.168.10.1
dhcp-option=tag:vlan20,42,192.168.20.1
